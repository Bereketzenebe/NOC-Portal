<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 On-Call Escalation Matrix | Safaricom NOC</title>
    <script>if (!sessionStorage.getItem('nocLoggedIn')) { window.location.replace('login.html'); }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { safaricomGreen: '#00B050', safaricomRed: '#FF0000', safaricomDark: '#1E293B' } } } }</script>
</head>
<body class="bg-slate-900 font-sans text-slate-100 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm text-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center font-bold text-2xl tracking-tight text-safaricomGreen">
                <span class="text-safaricomRed text-3xl mr-1">●</span>Safaricom
                <span class="text-safaricomDark font-normal ml-2 text-lg border-l pl-2 border-gray-300 hidden sm:inline">NOC Portal</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span id="userNameDisplay" class="text-xs font-bold text-slate-800">NOC Operator</span>
                    <span id="roleBadge" class="text-[9px] bg-green-600 text-white px-1.5 py-0.5 rounded uppercase font-bold">Operator</span>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-xs font-bold text-red-500 hover:text-red-700 transition-colors uppercase">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col lg:flex-row gap-6 w-full flex-1">
        <aside class="w-full lg:w-64 shrink-0">
            <nav class="flex flex-row lg:flex-col overflow-x-auto lg:overflow-visible bg-slate-800 p-2 rounded-2xl border border-slate-700/50 gap-1 shadow-xl">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl whitespace-nowrap hover:bg-slate-700/50 hover:text-white transition-all"><i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard</a>
                <a href="roster.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl whitespace-nowrap hover:bg-slate-700/50 hover:text-white transition-all"><i class="fa-solid fa-calendar-days w-5 text-center"></i> NOC Roster</a>
                <a href="oncall.html" class="flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-xl whitespace-nowrap bg-safaricomGreen text-white shadow-md transition-all"><i class="fa-solid fa-phone-volume w-5 text-center text-white"></i> L2 On-Call Team</a>
                <a href="process.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl whitespace-nowrap hover:bg-slate-700/50 hover:text-white transition-all"><i class="fa-solid fa-book-open w-5 text-center"></i> NOC Process</a>
                <a href="handover.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl whitespace-nowrap hover:bg-slate-700/50 hover:text-white transition-all"><i class="fa-solid fa-arrow-right-arrow-left w-5 text-center"></i> Shift Handover</a>
            </nav>
        </aside>

        <main class="flex-1 space-y-6">
            <div class="bg-slate-800/60 border border-slate-700/50 p-4 rounded-2xl shadow-xl flex flex-col sm:flex-row items-center justify-between gap-4">
                <div>
                    <h2 class="text-base font-black text-white tracking-tight">Level 2 Domain Support Escalations</h2>
                    <p class="text-xs text-slate-400 font-medium">Real-time functional contact points for active incident triage — loaded from oncall.csv</p>
                </div>
                <div class="w-full sm:w-72 relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500 pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="domainSearch" oninput="filterDomainCards()" placeholder="Search domain or engineer name…"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-200 focus:outline-none focus:border-safaricomGreen">
                </div>
            </div>

            <!-- Loaded state -->
            <div id="loadingState" class="text-center py-12 text-slate-500 text-sm">
                <i class="fa-solid fa-circle-notch fa-spin text-safaricomGreen text-2xl mb-3 block"></i>
                Loading on-call data…
            </div>
            <div id="domainGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 hidden"></div>
            <div id="noResults" class="hidden text-center py-12 text-slate-500 text-sm">
                <i class="fa-solid fa-search text-2xl mb-3 block"></i>
                No engineers match your search.
            </div>
        </main>
    </div>

    <script>
        // ─── Auth ─────────────────────────────────────────────────────────────────
        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

        // ─── Safe HTML escape ────────────────────────────────────────────────────
        function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        // ─── Color map (Tailwind CDN includes all utilities) ──────────────────────
        const COLOR_MAP = {
            green:  { header: 'text-safaricomGreen', border: 'border-l-safaricomGreen', badge: 'text-safaricomGreen bg-emerald-950/50' },
            amber:  { header: 'text-amber-500',      border: 'border-l-amber-500',      badge: 'text-amber-400 bg-amber-950/50' },
            sky:    { header: 'text-sky-400',         border: 'border-l-sky-400',        badge: 'text-sky-400 bg-sky-950/50' },
            purple: { header: 'text-purple-400',      border: 'border-l-purple-400',     badge: 'text-purple-400 bg-purple-950/50' },
            red:    { header: 'text-red-400',         border: 'border-l-red-400',        badge: 'text-red-400 bg-red-950/50' },
            blue:   { header: 'text-blue-400',        border: 'border-l-blue-400',       badge: 'text-blue-400 bg-blue-950/50' },
        };

        // ─── Build engineer card HTML ─────────────────────────────────────────────
        function buildEngineerRow(eng, isPrimary, c) {
            const cleanPhone = eng.Phone.replace(/\s/g, '');
            return `
            <div class="p-3 ${isPrimary ? 'bg-slate-900/60' : 'bg-slate-900/30 opacity-80'} border-l-2 ${isPrimary ? c.border : 'border-l-slate-700'} rounded-xl flex items-center justify-between shadow-sm">
                <div class="space-y-0.5 min-w-0">
                    <span class="text-[9px] font-black uppercase ${isPrimary ? c.badge : 'text-slate-400 bg-slate-800'} px-1.5 py-0.5 rounded">${eng.Tier}</span>
                    <h4 class="text-xs font-bold text-white mt-1 engineer-name">${eng.Name}</h4>
                    <div class="text-[10px] text-slate-400 font-mono tracking-wide">🕿 ${eng.Phone}</div>
                    <div class="text-[10px] text-slate-500 font-mono truncate max-w-[180px]">✉ ${eng.Email}</div>
                </div>
                <div class="flex items-center gap-1.5 shrink-0 ml-2">
                    <a href="tel:${cleanPhone}" class="p-2 bg-slate-800 border border-slate-700 rounded-lg hover:border-safaricomGreen hover:text-safaricomGreen text-slate-400 text-xs transition-colors">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                    <a href="mailto:${eng.Email}" class="p-2 bg-slate-800 border border-slate-700 rounded-lg hover:border-safaricomGreen hover:text-safaricomGreen text-slate-400 text-xs transition-colors">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                </div>
            </div>`;
        }

        // ─── Build domain card grid from CSV data ─────────────────────────────────
        function buildCards(data) {
            // Group engineers by domain (preserving first-seen order)
            const domainOrder = [];
            const domainMap = {};
            data.forEach(eng => {
                if (!domainMap[eng.Domain]) {
                    domainOrder.push(eng.Domain);
                    domainMap[eng.Domain] = { code: eng.DomainCode, icon: eng.Icon, color: eng.Color, engineers: [] };
                }
                domainMap[eng.Domain].engineers.push(eng);
            });

            return domainOrder.map(domain => {
                const info   = domainMap[domain];
                const c      = COLOR_MAP[info.color] || COLOR_MAP.green;
                const rows   = info.engineers.map((eng, idx) => buildEngineerRow(eng, idx === 0, c)).join('');
                return `
                <div class="domain-card bg-slate-800/40 border border-slate-700/50 rounded-2xl overflow-hidden shadow-xl flex flex-col">
                    <div class="bg-slate-800 px-5 py-3 border-b border-slate-700/60 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-${info.icon} ${c.header} text-sm"></i>
                            <h3 class="text-xs font-bold text-white uppercase tracking-wider domain-title">${domain}</h3>
                        </div>
                        <span class="text-[9px] font-mono text-slate-400 bg-slate-900 px-2 py-0.5 rounded">${info.code}</span>
                    </div>
                    <div class="p-4 space-y-3 flex-1">${rows}</div>
                </div>`;
            }).join('');
        }

        function filterDomainCards() {
            const q = document.getElementById('domainSearch').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.domain-card');
            let visible = 0;
            cards.forEach(card => {
                const title     = card.querySelector('.domain-title').textContent.toLowerCase();
                const engineers = Array.from(card.querySelectorAll('.engineer-name')).map(e => e.textContent.toLowerCase());
                const match     = !q || title.includes(q) || engineers.some(n => n.includes(q));
                card.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            document.getElementById('noResults').classList.toggle('hidden', visible > 0);
        }

        // ─── Initialise: prefer server-injected data, fall back to AJAX ──────────
        async function initOncall() {
            const injected = window.__ONCALL_DATA__;
            if (Array.isArray(injected) && injected.length > 0) {
                render(injected);
                return;
            }
            try {
                const res = await fetch('/api/oncall');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                render(Array.isArray(json.oncall) ? json.oncall : []);
            } catch (err) {
                console.error('On-call fetch error:', err);
                document.getElementById('loadingState').innerHTML =
                    '<i class="fa-solid fa-circle-exclamation text-red-400 text-2xl mb-2 block"></i><span class="text-red-400">Could not load on-call data.</span>';
            }
        }

        function render(data) {
            document.getElementById('loadingState').classList.add('hidden');
            const grid = document.getElementById('domainGrid');
            grid.innerHTML = buildCards(data);
            grid.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // User display
            const name = sessionStorage.getItem('nocDisplayName') || 'User';
            const role = sessionStorage.getItem('nocUserRole') || 'guest';
            document.getElementById('userNameDisplay').textContent = name;
            const badge = document.getElementById('roleBadge');
            badge.textContent = role.charAt(0).toUpperCase() + role.slice(1);
            badge.className = 'text-[9px] px-1.5 py-0.5 rounded uppercase font-bold ' + (
                role === 'admin' ? 'bg-slate-700 text-white' :
                role === 'operator' ? 'bg-green-600 text-white' : 'bg-gray-400 text-white'
            );
            initOncall();
        });
    </script>
</body>
</html>
